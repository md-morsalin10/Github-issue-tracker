<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Tracker | Home</title>
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- link css -->
    <link rel="stylesheet" href="style/style.css">
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-200">
    <!-- navbar -->
    <header>
        <div class="navbar w-full">
            <div class="navbar bg-base-100 shadow-sm">
                <div class="navbar-start">
                    <div>
                        <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
                    </div>
                    <div class="pl-2">
                        <p class="text-[#1F2937] text-xl lg:text-2xl font-semibold">GitHub Issues Tracker</p>
                    </div>
                </div>

                <div class="navbar-end">
                    <div class="join">
                        <div class="pr-4">
                            <label class="input validator join-item rounded">
                                <span class="text-[#64748B]"><i class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="text" placeholder="Search issues..." required />
                            </label>
                        </div>
                        <button class="btn btn-primary rounded"> + New Issue</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!--btn section  -->
    <section class="w-10/12 mx-auto">
        <div id="btn-container" class="bg-base-100 py-6 px-6 rounded-lg shadow-sm space-x-3">
            <button id="all-btn" onclick="loadCard()" class="btn btn-primary px-6">All</button>
            <button id="open-btn" onclick="openCard()" class="btn px-6">Open</button>
            <button id="closed-btn" onclick="closedCard()" class="btn px-6">Closed</button>
        </div>
    </section>

    <!--total issue  -->
    <section class="w-10/12 mx-auto py-5">
        <div class="flex justify-between items-center bg-base-100 rounded-lg shadow-sm py-6 px-6">
            <div class="flex items-center gap-3">
                <div><img src="./assets/Aperture.png" alt=""></div>
                <div>
                    <p id="total-issue" class="text-xl font-semibold text-[#1F2937]">50</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                <p>open</p>
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                <p>closed</p>
            </div>
        </div>
    </section>

    <section id="spinner" class="flex justify-center items-center hidden">
        <span class="loading loading-infinity loading-xl"></span>
    </section>

    <!-- all cards -->
    <section id="card-container" class="w-10/12 mx-auto bg-base-200 py-8 grid grid-cols-1 md:grid-cols-4 gap-5">

    </section>

    <!-- modal -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="space-y-6 p-5">
              

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    
    <script src="script/home.js"></script>
</body>

</html>
